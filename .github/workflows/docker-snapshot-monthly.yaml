name: docker-snapshot-monthly

on:
  schedule:
    - cron: '0 0 1 * *' # First day of every month at midnight UTC
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source:
          - ubuntu:rolling
          - ubuntu:latest
          - ubuntu:24.04
          - ubuntu:22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: normalized-repository-name
        id: normalized-repository-name
        uses: ./.github/actions/normalize
        with:
          string: ${{ github.repository }}

      - name: setup-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pull-retag-push
        uses: ./.github/actions/docker-pull-retag-push
        with:
          source: ${{ matrix.source }}
          destination: ghcr.io/${{ steps.normalized-repository-name.outputs.string }}/monthly/${{ matrix.source }}
