name: test-docker-typical-build-push

on:
  pull_request:
    paths:
      - '.github/actions/docker-typical-build-push/**'
      - '.github/workflows/test-docker-typical-build-push.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  gha-backend:
    name: gha-backend
    runs-on: ubuntu-latest
    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6

      - name: setup-login
        id: setup-login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup-buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4

      - name: write-dockerfile
        id: write-dockerfile
        shell: bash
        run: |
          set -euo pipefail
          cat > "${GITHUB_WORKSPACE}/test.dockerfile" <<'DOCKERFILE_EOF'
          FROM alpine:3.20 AS base
          RUN echo base > /etc/tested-stage
          FROM base AS final
          RUN echo final > /etc/tested-stage
          DOCKERFILE_EOF

      - name: compute-image-name
        id: compute-image-name
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          repo_lower="$(printf '%s' "${REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${repo_lower}/action-tests/docker-typical-build-push/gha" >> "${GITHUB_OUTPUT}"

      - name: build-and-push
        id: build-and-push
        uses: ./.github/actions/docker-typical-build-push
        with:
          dockerfile: test.dockerfile
          target-stage: final
          image-name: ${{ steps.compute-image-name.outputs.name }}
          cache-backend: gha

      - name: assert-pushed
        id: assert-pushed
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.compute-image-name.outputs.name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}:sha-${SHA}"
          docker manifest inspect "${image}" > /dev/null
          echo "OK: ${image} pushed and inspectable"

  registry-backend:
    name: registry-backend
    runs-on: ubuntu-latest
    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6

      - name: setup-login
        id: setup-login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup-buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4

      - name: write-dockerfile
        id: write-dockerfile
        shell: bash
        run: |
          set -euo pipefail
          cat > "${GITHUB_WORKSPACE}/test.dockerfile" <<'DOCKERFILE_EOF'
          FROM alpine:3.20 AS base
          RUN echo base > /etc/tested-stage
          FROM base AS final
          RUN echo final > /etc/tested-stage
          DOCKERFILE_EOF

      - name: compute-image-names
        id: compute-image-names
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          repo_lower="$(printf '%s' "${REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          prefix="ghcr.io/${repo_lower}/action-tests/docker-typical-build-push"
          echo "image-name=${prefix}/registry"      >> "${GITHUB_OUTPUT}"
          echo "shared-cache=${prefix}/shared:cache" >> "${GITHUB_OUTPUT}"

      - name: build-and-push
        id: build-and-push
        uses: ./.github/actions/docker-typical-build-push
        with:
          dockerfile: test.dockerfile
          target-stage: final
          image-name: ${{ steps.compute-image-names.outputs.image-name }}
          cache-backend: registry
          shared-cache-to: ${{ steps.compute-image-names.outputs.shared-cache }}

      - name: assert-pushed
        id: assert-pushed
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.compute-image-names.outputs.image-name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}:sha-${SHA}"
          docker manifest inspect "${image}" > /dev/null
          echo "OK: ${image} pushed and inspectable"
