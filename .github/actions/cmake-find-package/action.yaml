name: cmake-find-package
description: |
  Validates presence and findability of a library in a docker image using ajakhotia/importTester.
  Generic hooks (pre-check, post-check) and extra volume mounts let callers provision the
  container at runtime (e.g. extract an archive, apt-install dependencies) without coupling
  this action to any particular provisioning scheme.

inputs:
  library-name:
    description: |
      Library to test. Forwarded as the argument to a find_package(... REQUIRED) call in cmake.
      Example: "Boost"
    required: true

  prefix-path:
    description: |
      A ; delimited string containing prefix paths of where the library might exist in the image.
      Example: "/opt/robotFarm"
    required: false

  image-name:
    description: |
      Fully qualified image name to run the check inside.
      Example: "ubuntu:24.04"
    required: true

  pre-check:
    description: |
      Bash commands executed inside the container before the find_package check runs.
      Typical use is to extract an archive and apt-install runtime dependencies.
      Ignored when empty.
      Example: "apt-get update && apt-get install -y cmake build-essential"
    required: false
    default: ""

  post-check:
    description: |
      Bash commands executed inside the container after the find_package check runs.
      Typical use is to surface logs or run post-install sanity checks.
      Ignored when empty.
      Example: "cat /tmp/importTester-build/CMakeCache.txt"
    required: false
    default: ""

  volumes:
    description: |
      Newline-separated extra `-v` arguments appended to the `docker run` invocation.
      Each line is a single volume spec; blank lines are ignored.
      Example: "${{ github.workspace }}/artifact:/tmp/artifact:ro"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: checkout-import-tester
      id: checkout-import-tester
      uses: actions/checkout@v6
      with:
        repository: ajakhotia/importTester
        path: importTester
        ref: main

    - name: write-hooks
      id: write-hooks
      shell: bash
      run: |
        set -euo pipefail
        hooks_dir="${RUNNER_TEMP}/cmake-find-package-hooks"
        rm -rf "${hooks_dir}"
        mkdir -p "${hooks_dir}"

        cat > "${hooks_dir}/pre-check.sh" <<'CMAKE_FIND_PACKAGE_PRE_CHECK_EOF'
        ${{ inputs.pre-check }}
        CMAKE_FIND_PACKAGE_PRE_CHECK_EOF

        cat > "${hooks_dir}/post-check.sh" <<'CMAKE_FIND_PACKAGE_POST_CHECK_EOF'
        ${{ inputs.post-check }}
        CMAKE_FIND_PACKAGE_POST_CHECK_EOF

        echo "hooks_dir=${hooks_dir}" >> "${GITHUB_OUTPUT}"

    - name: find-library
      id: find-library
      shell: bash
      run: |
        set -euo pipefail

        extra_volumes=()
        while IFS= read -r line; do
          [[ -n "${line}" ]] && extra_volumes+=(--volume "${line}")
        done <<< "${{ inputs.volumes }}"

        docker run --rm                                                                                \
          --volume ./importTester:/tmp/importTester-src:ro                                             \
          --volume "${{ steps.write-hooks.outputs.hooks_dir }}":/tmp/cmake-find-package-hooks:ro       \
          "${extra_volumes[@]}"                                                                        \
          ${{ inputs.image-name }}                                                                     \
          bash -c '
            set -euo pipefail
            bash /tmp/cmake-find-package-hooks/pre-check.sh
            cmake -S /tmp/importTester-src                                                             \
                  -B /tmp/importTester-build                                                           \
                  -DCMAKE_PREFIX_PATH:STRING="${{ inputs.prefix-path }}"                               \
                  -DIMPORT_TESTER_PACKAGE_LIST:STRING="${{ inputs.library-name }}"
            bash /tmp/cmake-find-package-hooks/post-check.sh
          '
