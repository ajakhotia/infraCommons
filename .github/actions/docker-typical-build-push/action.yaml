name: docker-typical-build-push
description: |
  Builds a stage out of a dockerfile, pushes it as a tagged image, and manages
  build caches automatically via registry cache.

  NOTE: Callers must set up a buildx builder (docker/setup-buildx-action) once
  per job before invoking this action. This ensures sequential stage builds
  within the same job share BuildKit's internal cache.

inputs:
  dockerfile:
    required: true
    description: "Dockerfile to build."

  target-stage:
    required: true
    description: "Stage to build."

  image-name:
    required: true
    description: "Fully qualified image name (e.g. ghcr.io/owner/repo/build/stage)."

  shared-cache:
    required: false
    description: |
      Fully qualified registry ref for a shared build cache
      (e.g. ghcr.io/owner/repo:cache). When provided, the build reads from and
      writes to this shared cache in addition to the per-image cache. Use the
      same value across all stages of a multi-stage dockerfile to share layers
      between stages built in separate jobs or runs.

  build-args:
    required: false
    description: "Build arguments to pass to docker."

runs:
  using: "composite"
  steps:
    - name: docker-metadata
      id: docker-metadata
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.image-name }}
        tags: |
          type=sha,format=long
          type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: docker-stage-build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.target-stage }}
        push: true
        tags: ${{ steps.docker-metadata.outputs.tags }}
        labels: ${{ steps.docker-metadata.outputs.labels }}
        cache-from: |
          type=registry,ref=${{ inputs.image-name }}:cache
          ${{ inputs.shared-cache && format('type=registry,ref={0}', inputs.shared-cache) || '' }}
        cache-to: |
          type=registry,ref=${{ inputs.image-name }}:cache,mode=max
          ${{ inputs.shared-cache && format('type=registry,ref={0},mode=max', inputs.shared-cache) || '' }}
        build-args: |
          ${{ inputs.build-args }}
